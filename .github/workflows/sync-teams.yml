name: Sync Tier 1 Teams

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC (low-traffic hour)
  workflow_dispatch:        # allow manual trigger from Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Sync tier 1 teams from active tournaments
        run: |
          curl -s -X GET "https://spectateesports.live/api/tournaments?mode=sync-teams" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Sync Tier 1 Teams — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Sync Tier 1 Teams** cron job failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
