name: VOD Enrich

# Resolves twitch_vod_id / vod_offset_s for completed match_stream_history rows (main
# channel) AND match_stream_vods rows (alt/language channels), so replay links are served
# from permanent Supabase storage instead of the 24h-TTL KV cache. Runs the existing
# `npm run vod-enrich` script (it calls the LOCKED resolver per channel — does not
# reimplement it). P3.4 of .claude/all-stream-urls-spec.md.
#
# Requires repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# (Settings → Secrets and variables → Actions). CRON_SECRET is NOT needed — the script
# talks to Supabase + the public resolver directly.

on:
  schedule:
    - cron: '2,17,32,47 * * * *'   # every 15 min, offset to avoid runner-queue congestion
  workflow_dispatch:           # manual trigger from the Actions UI

# A delayed run must never overlap a still-running one. The script is idempotent
# (only fills unresolved rows), so a skipped overlap loses nothing.
concurrency:
  group: vod-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PANDASCORE_TOKEN: ${{ secrets.PANDASCORE_TOKEN }}
      BATCH: '40'              # rows per pass (main + alt); generous headroom under Twitch limits
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run VOD enrichment
        run: npm run vod-enrich
      # Backfill ps_match_id / tournament / streams_json for rows that were born from a
      # PandaScore-blind write path (ts/KV fallback) and never enriched. enrich-history
      # queries PandaScore directly (fixes all-null series); enrich-history-siblings then
      # copies onto remaining null rows from an already-enriched sibling game. Both scripts
      # are idempotent (only touch rows with null tournament). This workflow fires 4x/hour;
      # the gate restricts enrichment to ~every 3h (the :02 run of hours divisible by 3) so
      # we don't re-hammer PandaScore for series it will never index.
      - name: Backfill PS enrichment (every ~3h)
        run: |
          if [ -z "$PANDASCORE_TOKEN" ]; then
            echo "Skipping PS enrichment — PANDASCORE_TOKEN secret not set"
            exit 0
          fi
          HOUR=$(date -u +%H); MIN=$(date -u +%M)
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && { [ $((10#$HOUR % 3)) -ne 0 ] || [ $((10#$MIN)) -ge 15 ]; }; then
            echo "Skipping PS enrichment — runs ~every 3h (now ${HOUR}:${MIN} UTC, dispatch to force)"
            exit 0
          fi
          npm run enrich-history
          npm run enrich-history-siblings
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: VOD Enrich — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **VOD Enrich** cron job failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
