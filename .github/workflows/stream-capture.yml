name: Stream Capture

# Captures running-match → Twitch channel bindings (stream:match / stream:ts KV) so a
# completed series resolves its replay DURING the broadcast, not only after it ends.
# Runs every 10 min: a Dota game is ~35 min, so a 30-min cadence aliased past whole games
# that started and finished between samples, leaving them with no channel record.
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (GitHub may delay under load; still far tighter than 30)
  workflow_dispatch:

# Never let a delayed run pile on top of a still-running one — capture is idempotent
# (nx:true writes) so a skipped overlap loses nothing.
concurrency:
  group: stream-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Cache live stream channels
        run: |
          curl -s --max-time 120 -X GET "https://spectateesports.live/api/live-matches?cron=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Stream Capture — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Stream Capture** cron job failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
