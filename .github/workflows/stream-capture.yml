name: Stream Capture

# Captures running-match → Twitch channel bindings (stream:match / stream:ts KV) so a
# completed series resolves its replay DURING the broadcast, not only after it ends.
#
# SCHEDULE MOVED TO QSTASH (2026-06-26): GitHub Actions throttling fired this `*/15` cron
# only every ~1.5-4h in practice. The 15-min trigger now lives in a QStash schedule
# (`npm run setup-qstash`, see scripts/setup-qstash-schedules.mjs) which hits the same
# `/api/live-matches?cron=1` endpoint reliably. This workflow is kept as a manual fallback
# only (run from the Actions UI). auto-tweet.yml still pings cron=1 every 30 min as backup.
on:
  # schedule: disabled — replaced by QStash schedule (more reliable than GHA cron)
  workflow_dispatch:

# Never let a delayed run pile on top of a still-running one — capture is idempotent
# (nx:true writes) so a skipped overlap loses nothing.
concurrency:
  group: stream-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Cache live stream channels
        run: |
          curl -s --max-time 120 -X GET "https://spectateesports.live/api/live-matches?cron=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Stream Capture — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Stream Capture** cron job failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
