name: Match Poll Tweet

on:
  schedule:
    - cron: '30 */2 * * *'  # every 2 hours at :30 — posts prediction polls for matches starting in 90–240 min
  workflow_dispatch:         # allow manual trigger from Actions UI

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post pre-match prediction polls
        run: |
          curl -s -X GET "https://spectateesports.live/api/draft-posts?type=poll" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Match Poll — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Match Poll** tweet cron failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
