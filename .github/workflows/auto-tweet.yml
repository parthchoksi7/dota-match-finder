name: Auto Tweet

on:
  schedule:
    - cron: '13,43 * * * *'  # every 30 min, offset from top-of-hour to avoid GitHub runner queue congestion
  workflow_dispatch:          # allow manual trigger from Actions UI

jobs:
  tweet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Cache live stream channels
        run: |
          curl -s -X GET "https://spectateesports.live/api/live-matches?cron=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Trigger auto-tweet
        run: |
          curl -s -X POST https://spectateesports.live/api/draft-posts \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"cron"}' \
            --fail-with-body
      # - name: Reply to tournament result tweets
      #   continue-on-error: true
      #   run: |
      #     curl -s -X GET "https://spectateesports.live/api/draft-posts?type=reply" \
      #       -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
      #       --fail-with-body
      #   # Re-enable when Twitter API Basic tier ($100/mo) is active — free tier
      #   # blocks GET /2/users/:id/tweets (other users' timelines).
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Auto Tweet — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Auto Tweet** cron job failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
