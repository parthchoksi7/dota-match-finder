name: Warm Stream History

# Autonomously binds completed tier-1 series (incl. TI qualifiers, where PandaScore
# leaves external_identifier null) to their Twitch channel by driving the existing
# /api/match-streams resolver server-side. Closes the gap where a series only got a
# replay record once a user opened its drawer. Thin trigger only — all secrets stay
# server-side in Vercel env; the trigger carries just CRON_SECRET.
#
# SCHEDULE MOVED TO QSTASH (2026-06-26): the Vercel Hobby plan caps crons at daily, so this
# used GitHub Actions — but GHA throttling fired the `*/15` cron only every ~1.5-4h in
# practice, leaving completed series un-bound for hours. The 15-min trigger now lives in a
# QStash schedule (`npm run setup-qstash`, see scripts/setup-qstash-schedules.mjs) hitting
# the same `/api/live-matches?cron=warm-streams` endpoint reliably. This workflow is kept
# as a manual fallback only (run from the Actions UI).

on:
  # schedule: disabled — replaced by QStash schedule (more reliable than GHA cron)
  workflow_dispatch:         # allow manual trigger from the Actions UI

jobs:
  warm:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Warm stream history (fuzzy-bind completed series)
        run: |
          curl -s -X GET "https://spectateesports.live/api/live-matches?cron=warm-streams" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Warm Stream History — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Warm Stream History** cron failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
