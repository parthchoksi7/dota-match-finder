name: Error Monitor

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours — incident detection
    - cron: '0 8 * * *'      # daily at 08:00 UTC — digest (only if errors found)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Fetch error report
        id: report
        run: |
          BODY=$(curl -s --max-time 30 \
            "https://spectateesports.live/api/tournaments?mode=monitor&report=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body)

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "critical=$(echo "$BODY" | jq -r '.critical // false')" >> "$GITHUB_OUTPUT"
          echo "error_count=$(echo "$BODY" | jq -r '.error_count // 0')" >> "$GITHUB_OUTPUT"
          echo "error_count_24h=$(echo "$BODY" | jq -r '.error_count_24h // 0')" >> "$GITHUB_OUTPUT"

      # Creates a new issue or comments on an existing open [Alert] issue (deduplication).
      # Only fires when critical: true (≥3 errors from same endpoint in 2h, or service down).
      - name: Create or update alert issue
        if: steps.report.outcome == 'success' && steps.report.outputs.critical == 'true'
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.report.outputs.body }}
        with:
          script: |
            const report = JSON.parse(process.env.REPORT_JSON)

            const serviceTable = Object.entries(report.services || {})
              .map(([k, v]) => `| ${k} | ${v.status === 'ok' ? '✅ ok' : '❌ error'} | ${v.latency_ms}ms |${v.error ? ` ${v.error}` : ''}`)
              .join('\n')

            const body = [
              `## 🚨 Error Monitor Alert — ${new Date().toUTCString()}`,
              '',
              `**${report.error_count} errors** detected in the last 2 hours.`,
              '',
              '### Analysis',
              report.summary || '_No analysis available._',
              '',
              '### Error Breakdown',
              '```json',
              JSON.stringify(report.errors_by_endpoint, null, 2),
              '```',
              '',
              '### Service Health',
              '| Service | Status | Latency |',
              '|---|---|---|',
              serviceTable,
              '',
              '### Recent Error Samples',
              '```json',
              JSON.stringify((report.recent_errors || []).slice(0, 5), null, 2),
              '```',
              '',
              `---`,
              `*Detected at ${report.checked_at} · [Vercel Dashboard](https://vercel.com/dashboard)*`,
            ].join('\n')

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'monitoring',
              state: 'open',
            })

            const existingAlert = openIssues.find(i => i.title.startsWith('[Alert]'))

            if (existingAlert) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingAlert.number,
                body,
              })
              core.info(`Updated existing alert issue #${existingAlert.number}`)
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Alert] ${report.error_count} errors — ${new Date().toISOString().slice(0, 10)}`,
                body,
                labels: ['monitoring'],
              })
              core.info(`Created alert issue #${issue.number}`)
            }

      # Daily digest: only runs at 08:00 UTC (or manual dispatch) and only if errors exist.
      # If the day is clean, no issue is created — the green workflow run is proof enough.
      - name: Post daily digest
        if: >
          steps.report.outcome == 'success' &&
          (github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch') &&
          steps.report.outputs.error_count_24h != '0'
        uses: actions/github-script@v7
        env:
          REPORT_JSON: ${{ steps.report.outputs.body }}
        with:
          script: |
            const report = JSON.parse(process.env.REPORT_JSON)

            const serviceLines = Object.entries(report.services || {})
              .map(([k, v]) => `- ${v.status === 'ok' ? '✅' : '❌'} **${k}** (${v.latency_ms}ms)${v.error ? ` — ${v.error}` : ''}`)
              .join('\n')

            const errorSection = report.error_count > 0
              ? `\`\`\`json\n${JSON.stringify(report.errors_by_endpoint, null, 2)}\n\`\`\``
              : '✅ No errors in the current 2h window. Earlier in the day had issues — check Vercel logs for full picture.'

            const body = [
              `## Daily Error Digest — ${new Date().toISOString().slice(0, 10)}`,
              '',
              `**${report.error_count_24h} errors** tracked in the last 24 hours.`,
              '',
              '### Service Health',
              serviceLines,
              '',
              '### Error Breakdown (last 2h window)',
              errorSection,
              '',
              '### Analysis',
              report.summary || '_No errors in current window — earlier errors may have already resolved._',
              '',
              `---`,
              `*Daily digest · ${report.checked_at} · [Vercel Dashboard](https://vercel.com/dashboard)*`,
            ].join('\n')

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Digest] ${report.error_count_24h} errors — ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['monitoring'],
            })
