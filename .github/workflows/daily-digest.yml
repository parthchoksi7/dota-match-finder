name: Daily Digest Tweet

on:
  schedule:
    - cron: '0 9 * * *'  # 9 AM UTC daily — posts today's tier-1 match schedule
  workflow_dispatch:      # allow manual trigger from Actions UI

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post daily match digest
        run: |
          curl -s -X GET "https://spectateesports.live/api/draft-posts?type=digest" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
      - name: Create alert issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Alert] Cron failed: Daily Digest — ${new Date().toISOString().slice(0, 16)} UTC`,
              body: `The **Daily Digest** tweet cron failed.\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['monitoring'],
            })
